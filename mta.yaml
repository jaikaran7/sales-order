_schema-version: "3.3"
ID: sales-order-app
version: "1.0.0"
description: "Minimal CAP srv-only deployment"

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install
        - npx cds build --production

modules:
  - name: sales-order-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      command: node srv/server.js   # 🔥 ADD THIS LINE
    build-parameters:
      builder: npm