_schema-version: 3.3.0
ID: sales-order-app
version: 1.0.0
description: "A simple CAP project."

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm install --legacy-peer-deps
        - npx cds build --production
        - cp package.json gen/srv/package.json   # 🔥 VERY IMPORTANT

modules:
  - name: sales-order-app-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      command: node node_modules/@sap/cds/bin/cds.js run   # 🔥 FORCE CORRECT START
    build-parameters:
      builder: npm